<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page.title | default: site.title }}</title>

    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>

  <body>
    <nav class="topnav">
      <div class="nav-inner">
        <a class="brand" href="#top" aria-label="Home">
          <span class="brand-first">Carlo</span>
          <span class="brand-last">Lombardo</span><span class="brand-dot">.</span>
        </a>
        <div class="nav-links" id="mobile-menu">
          <a class="nav-link" href="#working-papers">Working papers</a>
          <a class="nav-link" href="#publications">Publications</a>
          <a class="nav-link" href="#work-in-progress">Work in progress</a>
          <a class="nav-link" href="#predoc">Pre-doctoral</a>
        </div>
        <button class="hamburger" id="menu-btn"
                aria-label="Toggle navigation"
                aria-expanded="false"
                aria-controls="mobile-menu">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
    </nav>

    <main id="top" class="container">
      {{ content }}
    </main>  
    
    <script>
    document.addEventListener("DOMContentLoaded", () => {
      // Mobile menu toggle
      const btn = document.getElementById("menu-btn");
      const menu = document.getElementById("mobile-menu");
      if (btn && menu) {
        btn.addEventListener("click", () => {
          const expanded = btn.getAttribute("aria-expanded") === "true";
          btn.setAttribute("aria-expanded", String(!expanded));
          menu.classList.toggle("is-open");
        });
        // Close when a nav link is tapped
        menu.querySelectorAll("a").forEach(a => {
          a.addEventListener("click", () => {
            btn.setAttribute("aria-expanded", "false");
            menu.classList.remove("is-open");
          });
        });
        // Close when clicking outside the nav
        document.addEventListener("click", (e) => {
          if (!btn.contains(e.target) && !menu.contains(e.target)) {
            btn.setAttribute("aria-expanded", "false");
            menu.classList.remove("is-open");
          }
        });
      }

      // Active section highlighting
      const links = Array.from(document.querySelectorAll(".nav-link[href^='#']"));
      const targets = links
        .map(a => document.querySelector(a.getAttribute("href")))
        .filter(Boolean);

      const setActive = (id) => {
        links.forEach(a => a.classList.toggle("active", a.getAttribute("href") === "#" + id));
      };

      const obs = new IntersectionObserver((entries) => {
        const visible = entries.filter(e => e.isIntersecting);
        if (!visible.length) return;
        visible.sort((a, b) => b.intersectionRatio - a.intersectionRatio);
        setActive(visible[0].target.id);
      }, { rootMargin: "-40% 0px -55% 0px", threshold: [0.1, 0.2, 0.35, 0.5, 0.65] });

      targets.forEach(t => obs.observe(t));

      links.forEach(a => a.addEventListener("click", () => {
        const id = a.getAttribute("href").slice(1);
        setActive(id);
      }));
    });
    </script>
    
  </body>
</html>
